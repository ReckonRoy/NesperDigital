<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nesper Digital — Premium Digital Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --navy: #0A1628;
            --navy-light: #152238;
            --blue: #2F80ED;
            --blue-light: #56CCF2;
            --gold: #F5A623;
            --gold-light: #FFD966;
            --white: #FFFFFF;
            --gray-100: #F7F9FC;
            --gray-200: #E8ECF3;
            --gray-400: #94A3B8;
            --gray-600: #475569;
            --gray-800: #1E293B;
            --shadow-sm: 0 4px 20px rgba(10, 22, 40, 0.06);
            --shadow-md: 0 8px 40px rgba(10, 22, 40, 0.10);
            --shadow-lg: 0 20px 60px rgba(10, 22, 40, 0.14);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--navy);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }
        ::selection {
            background: var(--blue);
            color: #fff;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--blue);
            border-radius: 10px;
        }

        /* ===== UTILITY ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .section-padding {
            padding: 100px 0 80px;
        }
        .section-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--blue);
            background: rgba(47, 128, 237, 0.10);
            padding: 4px 16px;
            border-radius: 30px;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }
        .section-sub {
            font-size: 1.1rem;
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto 48px;
            line-height: 1.7;
        }
        .text-center {
            text-align: center;
        }
        .text-gradient {
            background: linear-gradient(135deg, var(--blue), var(--blue-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== REVEAL ANIMATION ===== */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--blue), var(--blue-light));
            color: #fff;
            padding: 14px 34px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 30px rgba(47, 128, 237, 0.30);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(47, 128, 237, 0.40);
        }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: var(--navy);
            padding: 14px 34px;
            border: 2px solid var(--gray-200);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-secondary:hover {
            border-color: var(--blue);
            color: var(--blue);
            transform: translateY(-3px);
        }

        /* ============================================================
                   HEADER (shadow DOM via custom element)
                   ============================================================ */
        nesper-header {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* ============================================================
                   HERO
                   ============================================================ */
        hero-section {
            display: block;
            position: relative;
            min-height: 100vh;
        }

        /* ============================================================
                   INSIGHTS
                   ============================================================ */
        insights-section {
            display: block;
        }

        /* ============================================================
                   SERVICES
                   ============================================================ */
        services-section {
            display: block;
        }

        /* ============================================================
                   TRUST
                   ============================================================ */
        trust-section {
            display: block;
        }

        /* ============================================================
                   CLIENTS
                   ============================================================ */
        clients-section {
            display: block;
        }

        /* ============================================================
                   CASE STUDIES
                   ============================================================ */
        case-studies-section {
            display: block;
        }

        /* ============================================================
                   TEAM
                   ============================================================ */
        team-section {
            display: block;
        }

        /* ============================================================
                   CONTACT
                   ============================================================ */
        contact-section {
            display: block;
        }

        /* ============================================================
                   FOOTER
                   ============================================================ */
        footer-section {
            display: block;
        }

        /* ============================================================
                   MODAL
                   ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 24px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-overlay .modal-content {
            max-width: 800px;
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.4s ease;
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-overlay .modal-content img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
            background: var(--navy);
        }
        .modal-overlay .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: rgba(255, 255, 255, 0.20);
            backdrop-filter: blur(8px);
            border: none;
            color: #fff;
            font-size: 28px;
            line-height: 1;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay .modal-close:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: rotate(90deg);
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        @media (max-width: 768px) {
            .section-padding {
                padding: 70px 0 50px;
            }
            .section-sub {
                font-size: 1rem;
                padding: 0 8px;
            }
            .btn-primary,
            .btn-secondary {
                padding: 12px 26px;
                font-size: 0.85rem;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ====== CUSTOM ELEMENTS ====== -->
    <nesper-header></nesper-header>
    <hero-section></hero-section>
    <insights-section></insights-section>
    <services-section></services-section>
    <trust-section></trust-section>
    <clients-section></clients-section>
    <case-studies-section></case-studies-section>
    <team-section></team-section>
    <contact-section></contact-section>
    <footer-section></footer-section>

    <!-- ====== MODAL ====== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <img id="modalImg" src="" alt="Preview" />
        </div>
    </div>

    <script type="text/javascript" src="./assets/js/header-component.js"></script>
    <script type="text/javascript" src="./assets/js/indexhero-component.js"></script>
    <script type="text/javascript" src="./assets/js/insights-component.js"></script>
    <script type="text/javascript" src="./assets/js/service-component.js"></script>
    <script type="text/javascript" src="./assets/js/trust-section-component.js"></script>
    <script type="text/javascript" src="./assets/js/clients-component.js"></script>
    <script type="text/javascript" src="./assets/js/casestudy-component.js"></script>
    <script type="text/javascript" src="./assets/js/team-component.js"></script>
    <script type="text/javascript" src="./assets/js/contact-component.js"></script>
    <script type="text/javascript" src="./assets/js/contact-component.js"></script>
    <script type="text/javascript" src="./assets/js/footer-component.js"></script>
    <!-- ================================================================
    SCRIPTS — All components defined inline for a single-file experience
    ================================================================ -->
    <script>

        // ===== REVEAL ON SCROLL =====
        function initReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            document.querySelectorAll('*').forEach(el => {
                if (el.shadowRoot) {
                    el.shadowRoot.querySelectorAll('.reveal').forEach(inner => observer.observe(inner));
                }
            });
        }

        // ===== MODAL =====
        window.openModal = function(el) {
            const overlay = document.getElementById('modalOverlay');
            const img = document.getElementById('modalImg');
            if (!overlay || !img) return;
            const src = el?.querySelector('img')?.src || el?.src || '';
            if (src) {
                img.src = src;
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        document.getElementById('modalClose')?.addEventListener('click', () => {
            const overlay = document.getElementById('modalOverlay');
            if (overlay) {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('modalOverlay')?.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('modalOverlay')?.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            initReveal();
            setTimeout(initReveal, 400);
        });

        const observer = new MutationObserver(() => {
            document.querySelectorAll('.reveal').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) {
                    el.classList.add('active');
                }
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
